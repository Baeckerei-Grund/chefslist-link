<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chefslist öffnen…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      max-width: 340px;
      width: 90%;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.3rem;
      color: #333;
      margin: 0 0 0.5rem;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      margin: 0 0 1.5rem;
    }
    .btn {
      display: inline-block;
      background: #e8401c;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      width: 100%;
      box-sizing: border-box;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .status {
      font-size: 0.8rem;
      color: #999;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍽️</div>
    <h1>Chefslist</h1>
    <p>Die App wird geöffnet…</p>

    <a class="btn" id="appLink"
       href="intent://restaurant.chefslist.de/login#Intent;scheme=https;package=de.adornis.chefslist.app;S.browser_fallback_url=https%3A%2F%2Frestaurant.chefslist.de%2Flogin;end">
      App öffnen
    </a>

    <a class="btn btn-secondary"
       href="https://restaurant.chefslist.de/login">
      Im Browser öffnen
    </a>

    <p class="status" id="status">Automatische Weiterleitung läuft…</p>
  </div>

  <script>
    // Automatisch nach kurzem Delay den App-Link auslösen (benötigt User-Gesture-Kontext)
    window.addEventListener('load', function () {
      var isAndroid = /Android/i.test(navigator.userAgent);
      if (isAndroid) {
        // Kurze Verzögerung, dann automatisch versuchen die App zu öffnen
        setTimeout(function () {
          var intentUrl = "intent://restaurant.chefslist.de/login#Intent;scheme=https;package=de.adornis.chefslist.app;S.browser_fallback_url=https%3A%2F%2Frestaurant.chefslist.de%2Flogin;end";
          window.location.href = intentUrl;
          // Falls die App nicht installiert ist, bleibt der Browser auf dieser Seite
          setTimeout(function () {
            document.getElementById('status').textContent =
              'App nicht gefunden? Nutze den Button oben.';
          }, 2500);
        }, 800);
      } else {
        // Kein Android: direkt zur Web-App weiterleiten
        document.getElementById('status').textContent =
          'Kein Android erkannt – Browser-Version wird geöffnet.';
        setTimeout(function () {
          window.location.href = "https://restaurant.chefslist.de/login";
        }, 1500);
      }
    });
  </script>
</body>
</html>
